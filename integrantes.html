<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo - Galería</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="img/logo.png" alt="Logo" class="logo-img">
            <span>GALERÍA DE ARTE Y SUBASTAS</span>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">
                <img src="img/icon/nav_prototipo.png" alt="" class="nav-icon">
                <span>Prototipo</span>
            </a>
            <a href="crud.html" class="nav-item">
                <img src="img/icon/nav_inventario.png" alt="" class="nav-icon">
                <span>Inventario (CRUD)</span>
            </a>
            <a href="integrantes.html" class="nav-item active">
                <img src="img/icon/nav_equipo.png" alt="" class="nav-icon">
                <span>Equipo (CRUD)</span>
            </a>
        </nav>
    </header>

    <main class="team-layout">
        <div class="section-header">
            <div>
                <h2>Equipo de Estudiantes Desarrolladores</h2>
                <p class="subtitle">Mantenimiento de Datos del Grupo de Trabajo (CRUD de Memoria)</p>
            </div>
            <button class="btn-primary" onclick="abrirModalIntegrante()">Registrar Integrante</button>
        </div>

        <div id="gridIntegrantes" class="cards-grid">
            </div>
    </main>

    <dialog id="modalIntegrante" class="modal">
        <form method="dialog" id="formIntegrante">
            <h3 id="modalIntTitulo">Nuevo Integrante</h3>
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="intNombre" required>
            </div>
            <div class="form-group">
                <label>Rol / Especialidad</label>
                <input type="text" id="intRol" required>
            </div>
            <div class="form-group">
                <label>Código de Estudiante</label>
                <input type="text" id="intCodigo" required placeholder="Ej: USO-27291">
            </div>
            <div class="form-group">
                <label>Número de Expediente</label>
                <input type="text" id="intExpediente" required placeholder="Ej: 27291">
            </div>
            <div class="form-group">
                <label>Imagen (Ej: integrante1.jpg o ruta completa)</label>
                <input type="text" id="intImagen" placeholder="integrante1.jpg" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-danger" onclick="cerrarModalIntegrante()">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar</button>
            </div>
        </form>
    </dialog>

    <div id="toast" class="toast"></div>
    <script src="js/principal.js"></script>
</body>
</html>
